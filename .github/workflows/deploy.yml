name: Deploy portafolio to GitHub Pages

# En espera: el despliegue automático por push está desactivado a propósito
# porque la cuenta de GitHub tiene Actions bloqueado por un problema de
# facturación (ver commits de julio 2026). Mientras tanto, el sitio se
# construye en local y se publica a mano en la rama `gh-pages`, con Pages
# configurado en modo "legacy" (branch: gh-pages) en vez de "workflow".
# Una vez resuelta la facturación: cambiar `on:` de vuelta a incluir
# `push: branches: [main]`, y volver a configurar Pages con
# `gh api -X POST repos/MartinezAaron/portafolio/pages -f build_type=workflow`.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
